name: Daily Prompt Generation

on:
  schedule:
    # Runs every day at 00:05 UTC (5 min after midnight)
    - cron: '5 0 * * *'
  workflow_dispatch: # allows manual trigger from the GitHub Actions UI

jobs:
  generate-prompt:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Validate secrets are set
        run: |
          if [ -z "$APP_URL" ]; then
            echo "❌ APP_URL secret is not set or empty"
            exit 1
          fi
          if [ -z "$CRON_SECRET" ]; then
            echo "❌ CRON_SECRET secret is not set or empty"
            exit 1
          fi
          echo "✅ Secrets are set, calling $APP_URL"
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}

      - name: Call generate-prompt endpoint
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            -X GET \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${APP_URL}/api/generate-prompt")
          echo "Response status: $response"
          if [ "$response" != "200" ]; then
            echo "❌ Failed with status $response"
            exit 1
          fi
          echo "✅ Prompt generated successfully"
